; Custom PHP settings for the ERP backend (loaded as /usr/local/etc/php/conf.d/app.ini)

memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120
max_input_time = 120
max_input_vars = 5000

date.timezone = UTC
expose_php = Off

; Errors — verbose in local, silent in production. Override via php-fpm pool when needed.
display_errors = On
display_startup_errors = On
log_errors = On
error_reporting = E_ALL

; Sessions (overridden by Laravel session config, but kept sane as a baseline)
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.cookie_samesite = "Lax"

; Realpath cache helps with large frameworks
realpath_cache_size = 4096K
realpath_cache_ttl = 600
